# Dev-loop database: brings up only Postgres. The api runs on the host with
# `uv run fastapi dev app/main.py`. The integrated skeleton (web+api+db as
# prod-like images) lives in the root compose.yaml (Story #38).
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance}
      POSTGRES_DB: ${POSTGRES_DB:-finance}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
